name: Release Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (vMAJOR.MINOR.PATCH), e.g. v0.0.1"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            ext: ""
            archive_ext: zip
          - goos: linux
            goarch: amd64
            ext: ""
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive_ext: zip
          - goos: windows
            goarch: arm64
            ext: ".exe"
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.mod

      - name: Validate release tag format
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.release_tag }}"
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${TAG}"
            echo "Expected format: vMAJOR.MINOR.PATCH (example: v0.0.1)"
            exit 1
          fi

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail

          VERSION="${{ inputs.release_tag }}"
          VERSION="${VERSION#v}"

          COMMIT="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          OUTPUT="bb${{ matrix.ext }}"

          go build -trimpath \
            -ldflags "-s -w -X bitbucket-cli/internal/version.Version=${VERSION} -X bitbucket-cli/internal/version.Commit=${COMMIT} -X bitbucket-cli/internal/version.BuildDate=${BUILD_DATE}" \
            -o "${OUTPUT}" \
            ./cmd/bb

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ inputs.release_tag }}"
          VERSION="${VERSION#v}"
          ARCHIVE_NAME="bb_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"

          mkdir staging
          cp "bb${{ matrix.ext }}" staging/
          cp README.md staging/

          if [[ "${{ matrix.archive_ext }}" == "tar.gz" ]]; then
            tar -czf "${ARCHIVE_NAME}.tar.gz" -C staging "bb${{ matrix.ext }}" README.md
          else
            cd staging && zip -r "../${ARCHIVE_NAME}.zip" "bb${{ matrix.ext }}" README.md && cd ..
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bb_${{ matrix.goos }}_${{ matrix.goarch }}
          path: bb_*.${{ matrix.archive_ext }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.zip | sort -k2 > checksums.txt

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.release_tag }}"

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${TAG}" dist/* --title "${TAG}" --generate-notes --repo "${GITHUB_REPOSITORY}"
          fi
